base:
  seed: 1111
  lr: 0.0001
  weight_decay: 0.0001
  batch_size: 64
  n_epochs: 200
  num_workers: 8
  alpha: 0.7
  rec_loss: 'SmoothL1Loss' 
  train_mode: regression 
  missing_rate_eval_test: 0.5   
  do_validation: true

dataset:
  datasetName: mosei
  dataPath: "./data/CMU_MOSEI/Processed/unaligned_50.pkl"


model:

  com_dim: &com_dim 128
  dropout: &dropout 0.1

  feature_extractor:
    bert_pretrained: './bert-base-uncased'

  tmm: 
    input_length: [50, 500, 500]
    input_dim: [768, 35, 74]
    hidden_dim: *com_dim 
  tmr: 
    input_dim_low: 768
    hidden_dim_low: 768
    input_dim_high: *com_dim
    hidden_dim_high: *com_dim
    dropout: *dropout

  tc_mamba:
    num_layers: 1
    d_model: *com_dim 
    d_ffn: 1024
    activation: 'GELU'
    dropout: *dropout
    causal: false
    mamba_config:
      d_state: 12
      expand: 4
      d_conv: 4
      bidirectional: true
  tq_mamba:
    num_layers: 1
    d_model: *com_dim 
    d_ffn: 1024
    activation: 'GELU'
    dropout: *dropout
    causal: false
    mamba_config:
      d_state: 12
      expand: 4
      d_conv: 4
      bidirectional: true
    attn_heads: 8


  regression: #task learning
    input_dim: *com_dim
    out_dim: 1